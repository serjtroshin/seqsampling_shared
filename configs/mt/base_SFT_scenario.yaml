name: base_sft_scenario
backend: vllm
sampling_mode: parallel
model: meta-llama/Llama-3.1-8B-Instruct
src: en
src_lang_name: English
tgt: de
tgt_lang_name: German
prompts_path: ../../synth_data/data/processed/opus_train_pool.jsonl
output_dir: ../../outputs/sft/base_scenario/
output_filename: samples.jsonl
prompt_key: src_text
extra_data_fields:
  - src_lang
  - tgt_lang
  - tgt_text
prompt_template: "{src_lang_name}: {prompt}"
first_turn_instruction: "Translate the following text from {src_lang_name} to {tgt_lang_name}."
system_prompt: You are a helpful assistant.
first_turn_response_instruction: "Provide only the translation."
max_tokens: 500
temperature: 0.0
top_p: 1.0
top_k: 5
num_generations: 1
n_parallel: 1
history_k: null
vllm_base_url: http://localhost:8000/v1
vllm_api_key: dummy-key
request_timeout: 3600
target_inflight_generations: 1
vllm_host: 127.0.0.1
vllm_port: 8000
vllm_server_args: []
